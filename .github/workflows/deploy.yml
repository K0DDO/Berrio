name: Deploy production

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: berrio-production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy over SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          set -euo pipefail
          ssh -o StrictHostKeyChecking=yes "${VPS_USER}@${VPS_HOST}" bash -s <<'REMOTE'
          set -euo pipefail
          cd /opt/berrio

          COMPOSE="docker compose -f docker-compose.production.yml --env-file .env.production"
          API_HOST_PORT="$(grep -E '^API_HOST_PORT=' .env.production 2>/dev/null | tail -1 | cut -d= -f2- | tr -d '\r' || true)"
          API_HOST_PORT="${API_HOST_PORT:-8000}"
          HEALTH_URL="http://127.0.0.1:${API_HOST_PORT}/health"
          PREV_SHA="$(git rev-parse HEAD)"

          rollback() {
            echo "Deploy failed — rolling back to ${PREV_SHA}"
            git reset --hard "${PREV_SHA}"
            ${COMPOSE} build --pull
            ${COMPOSE} up -d
            exit 1
          }

          echo "==> Backup"
          ./scripts/backup.sh || echo "WARN: backup failed (continuing)"

          echo "==> git pull"
          git fetch origin main
          git checkout main
          git pull --ff-only origin main

          echo "==> Build"
          ${COMPOSE} build --pull

          echo "==> Migrate"
          ${COMPOSE} up -d postgres redis
          ${COMPOSE} run --rm --no-deps api alembic upgrade head

          echo "==> Restart"
          ${COMPOSE} up -d

          echo "==> Health"
          ok=0
          for i in $(seq 1 30); do
            if curl -fsS "${HEALTH_URL}" | grep -q '"status"'; then
              ok=1
              break
            fi
            sleep 2
          done
          if [[ "${ok}" -ne 1 ]]; then
            rollback
          fi

          echo "Deploy OK $(git rev-parse --short HEAD)"
          curl -fsS "${HEALTH_URL}"
          echo
          REMOTE
