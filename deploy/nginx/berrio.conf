# Berrio reverse proxy — host nginx (Ubuntu), safe on a shared VPS.
#
# Install:
#   sudo cp deploy/nginx/berrio.conf /etc/nginx/sites-available/berrio
#   # Replace SERVER_IP; do NOT use default_server if Amnezia/other sites own :80
#   sudo ln -sf /etc/nginx/sites-available/berrio /etc/nginx/sites-enabled/berrio
#   sudo nginx -t && sudo systemctl reload nginx
#
# If host port is not 8000, change proxy_pass to 127.0.0.1:API_HOST_PORT
#
# Later HTTPS:
#   sudo certbot --nginx -d api.berrio.com

server {
    listen 80;
    listen [::]:80;

    # Replace SERVER_IP with the VPS address, then later with api.berrio.com
    # Do not add "default_server" if another service already claims it.
    server_name SERVER_IP;

    client_max_body_size 20m;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 120s;
    }

    location /health {
        proxy_pass http://127.0.0.1:8000/health;
        proxy_set_header Host $host;
        access_log off;
    }
}

