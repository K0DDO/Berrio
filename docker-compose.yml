# Local stack: Postgres + Redis + API + Celery worker
#
# Setup:
#   cp backend/.env.local.example backend/.env.local
#   docker compose up --build
#
# API: http://localhost:8000/health
# Docs: http://localhost:8000/docs

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: berrio
      POSTGRES_PASSWORD: berrio
      POSTGRES_DB: berrio
    ports:
      - "5432:5432"
    volumes:
      - berrio_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U berrio -d berrio"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: ./backend
    env_file:
      - ./backend/.env.example
    environment:
      APP_ENV: development
      DEBUG: "true"
      SEED_DEMO_DATA: "true"
      SECRET_KEY: local-docker-secret-ok-for-beta
      EMAIL_HASH_PEPPER: local-docker-email-pepper
      DATABASE_URL: postgresql+asyncpg://berrio:berrio@postgres:5432/berrio
      DATABASE_URL_SYNC: postgresql://berrio:berrio@postgres:5432/berrio
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      CORS_ORIGINS: '["http://localhost:3000","http://127.0.0.1:3000","*"]'
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["/bin/sh", "/app/scripts/entrypoint.sh"]
    volumes:
      - ./backend:/app

  worker:
    build: ./backend
    env_file:
      - ./backend/.env.example
    environment:
      APP_ENV: development
      DEBUG: "true"
      SECRET_KEY: local-docker-secret-ok-for-beta
      EMAIL_HASH_PEPPER: local-docker-email-pepper
      DATABASE_URL: postgresql+asyncpg://berrio:berrio@postgres:5432/berrio
      DATABASE_URL_SYNC: postgresql://berrio:berrio@postgres:5432/berrio
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.workers.celery_app worker --loglevel=INFO --uid=nobody --gid=nogroup
    volumes:
      - ./backend:/app

volumes:
  berrio_pg:
